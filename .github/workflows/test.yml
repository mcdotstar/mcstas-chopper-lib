name: Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test the component(s) with Pytest
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Setup MSVC compilers for testing on Windows
        if: runner.os == 'Windows'
        uses: egor-tensin/vs-shell@v2

      - name: Debug MSVC compiler discovery on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cl = (Get-Command cl.exe -ErrorAction Stop).Source
          $link = (Get-Command link.exe -ErrorAction Stop).Source
          $lib = (Get-Command lib.exe -ErrorAction Stop).Source
          "CC=$cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii
          "MCCODEANTLR_CC=$cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii
          Write-Host "cl.exe=$cl"
          Write-Host "link.exe=$link"
          Write-Host "lib.exe=$lib"
          Write-Host "INCLUDE=$env:INCLUDE"
          Write-Host "LIB=$env:LIB"
          $probe = Join-Path $env:RUNNER_TEMP 'cl-probe.c'
          @'
          int main(void) { return 0; }
          '@ | Set-Content -Path $probe -Encoding ascii
          cl.exe /nologo /c /Bv $probe

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Test
        run: python -m pytest -s -v
